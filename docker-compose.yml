version: "3.8"

services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v2.6.0
    container_name: mealie
    restart: unless-stopped
    ports:
      - "${MEALIE_PORT:-9925}:9000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Europe/Istanbul}
      BASE_URL: ${BASE_URL:-http://localhost:9925}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
      MAX_WORKERS: ${MAX_WORKERS:-1}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      # PostgreSQL
      DB_ENGINE: postgres
      POSTGRES_USER: ${POSTGRES_USER:-mealie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mealie}
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-mealie}
      # SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Mealie}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_AUTH_STRATEGY: ${SMTP_AUTH_STRATEGY:-TLS}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # OpenAI (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - mealie-data:/app/data

  postgres:
    image: postgres:15-alpine
    container_name: mealie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mealie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mealie}
      POSTGRES_DB: ${POSTGRES_DB:-mealie}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mealie}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mealie-data:
  postgres-data:
